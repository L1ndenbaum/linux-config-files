<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- 英文等宽，用 JetBrainsMono Nerd Font Propo -->
 <match>
  <test compare="contains" name="lang">
   <string>en</string>
  </test>
  <edit mode="prepend" name="family">
   <string>DejaVuSansM Nerd Font Propo</string>
  </edit>
 </match>
 <!-- 中文等宽，用 Noto Sans Mono CJK -->
 <match>
  <test compare="contains" name="lang">
   <string>zh</string>
  </test>
  <edit mode="prepend" name="family">
   <string>Noto Sans Mono CJK SC</string>
  </edit>
 </match>
 <!-- 通用 fallback：ASCII 优先用 JetBrains，缺字再 fallback 到 CJK -->
 <match>
  <edit mode="prepend" name="family">
   <string>DejaVuSansM Nerd Font Propo</string>
  </edit>
  <edit mode="append" name="family">
   <string>Noto Sans Mono CJK SC</string>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
</fontconfig>
